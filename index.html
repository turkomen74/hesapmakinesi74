<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TURKOMEN GAMES</title>
    <!-- Google Search Console Mülk Doğrulaması -->
    <meta name="google-site-verification" content="arWRr6xel-AOzGOFiqQJxSbAfCYYLkQshrRLp8R7Qa4" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .game-card {
            background-color: #0a0a0a;
            border: 1px solid #1a1a1a;
            cursor: pointer;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
        .game-card:hover {
            border-color: #dc2626;
        }
        .hidden { display: none; }

        #game-container {
            width: 100%;
            height: 85vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            will-change: transform;
        }

        #game-frame {
            border: none;
            width: 100% !important;
            height: 100% !important;
            display: block;
            transform: translateZ(0); /* GPU Hızlandırma ve FPS Optimizasyonu */
        }

        #game-container:fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            background: #000;
        }
        #game-container:fullscreen #game-frame {
            width: 100vw !important;
            height: 100vh !important;
        }

        #game-container:-webkit-full-screen { width: 100vw; height: 100vh; }
        #game-container:-webkit-full-screen #game-frame { width: 100vw; height: 100vh; }

        .btn-primary {
            background-color: #dc2626;
            color: #ffffff;
            font-weight: 700;
            padding: 14px 28px;
            border-radius: 4px;
            text-align: center;
            display: inline-block;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-secondary {
            background-color: #1a1a1a;
            color: #fff;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            border: 1px solid #333;
        }

        .nav-icon {
            transition: opacity 0.2s;
        }
        .nav-icon:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <nav class="border-b border-zinc-900 p-6 flex justify-between items-center bg-black sticky top-0 z-50">

            TURKOMEN <span class="text-red-600">GAMES</span>

            </a>
            <a href="#" onclick="showView('home')" class="hover:text-white transition-none">ANA SAYFA</a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 pt-12">
        
        <section id="view-home">
            <h2 class="text-xs font-black mb-10 tracking-[0.3em] text-zinc-600 uppercase italic">Katalog / Oyun Seçiniz</h2>
            <div id="game-list" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <!-- Oyunlar JS ile gelecek -->
            </div>
        </section>

        <section id="view-detail" class="hidden">
            <button onclick="showView('home')" class="mb-12 text-zinc-500 hover:text-white flex items-center text-[10px] font-bold uppercase tracking-widest transition-none">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                KATALOĞA DÖN
            </button>
            
            <div class="max-w-4xl mx-auto">
                <h2 id="detail-title" class="text-6xl md:text-8xl font-black mb-8 text-red-600 uppercase italic tracking-tighter leading-none"></h2>
                <div class="h-1 w-24 bg-red-600 mb-12"></div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-12 items-start">
                    <div class="md:col-span-2">
                        <h3 class="text-zinc-600 text-xs font-black uppercase tracking-[0.2em] mb-4">Oyun Hakkında Bilgi</h3>
                        <p id="detail-desc" class="text-zinc-300 text-lg leading-relaxed mb-10 font-medium"></p>
                    </div>
                    <div class="bg-zinc-950 p-6 border border-zinc-900">
                         <h3 class="text-zinc-600 text-xs font-black uppercase tracking-[0.2em] mb-6">Kontrol Paneli</h3>
                         <button id="play-btn" class="btn-primary w-full text-lg tracking-tight">ŞİMDİ OYNA</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-player" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-4">
                    <h2 id="player-title" class="text-sm font-black text-red-600 uppercase italic tracking-widest"></h2>
                    <span class="text-zinc-800">|</span>
                    <button onclick="showView('detail')" class="text-[10px] font-bold text-zinc-500 hover:text-white uppercase tracking-widest">Oyun Sayfasına Dön</button>
                </div>
                <button id="fullscreen-btn" onclick="toggleFullscreen()" class="btn-secondary flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M3 4a1 1 0 011-1h4a1 1 0 010 2H5v3a1 1 0 01-2 0V4zm9 1a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-2 0V5h-3a1 1 0 01-1-1zm-9 9a1 1 0 011 1v3h3a1 1 0 010 2H4a1 1 0 01-1-1v-4a1 1 0 011-1zm13 1a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 010-2h3v-3a1 1 0 011-1z"></path></svg>
                    TAM EKRAN
                </button>
            </div>
            <div id="game-container" class="rounded-sm overflow-hidden border border-zinc-900 shadow-2xl relative">
                <iframe id="game-frame" src="" allow="fullscreen; autoplay; encrypted-media; picture-in-picture"></iframe>
            </div>
        </section>

    </main>

    <footer class="mt-32 border-t border-zinc-950 p-12 text-center">
        <p class="text-zinc-700 text-[10px] font-bold tracking-[0.5em] uppercase">
            &copy; 2026 TURKOMEN GAMES. TÜM HAKLARI SAKLIDIR.
        </p>
    </footer>

            {
                id: 'vice-city-sehri',
                title: 'Vice City Şehri',
                shortDesc: '80\'lerin neon ışıklı suç dünyasına geri dönün.',
                description: 'Grand Theft Auto: Vice City, oyuncuları 1986 yılının Vice City şehrine götürüyor. Tommy Vercetti\'nin hikayesini takip ettiğimiz bu efsane oyunda, şehrin yeraltı dünyasında yükselişe tanıklık ediyoruz. Muhteşem müzikler ve sınırsız aksiyon sizi bekliyor.',
                gameUrl: 'https://learn.edumain.net/games/vice-city/index.html?fullscreen=0&sc=1'

            {
                id: 'supheli-imposter',

            {
                id: '2d-ac-kopek-baligi',

                shortDesc: 'Denizin en tehlikeli avcısı olun.',
                description: 'Hungry Shark dünyasında olduğu gibi, devasa bir köpek balığını kontrol ediyorsunuz. Sürekli acıkan karnınızı doyurmak için balıkları, yüzücüleri ve hatta kuşları avlayın. Ne kadar çok yerseniz o kadar büyür ve puan kazanırsınız.',

                id: 'elastik-yuz',

                title: 'Surfers Subway',
                shortDesc: 'Tren raylarında bitmek bilmeyen bir kovalamaca!',
                description: 'Efsanevi sonsuz koşu oyunu. Engellerin üzerinden atla, trenlerin altından kay ve en yüksek puanı topla!',
                gameUrl: 'https://edumathtools.com/player?src=https%3A%2F%2Fgeet.in.net%2Fget%2Fsubway-surfers-ny%2Fgame.html'
            },
            {
                id: 'bloxorz',
                title: 'BLOXORZ',
                shortDesc: 'Zeka ve mantığın sınırlayan 3D blok oyunu.',
                description: 'Bir bloğu delikten düşürmek için platform üzerinde yuvarladığınız efsanevi bir zeka oyunu.',
                gameUrl: 'https://edumathtools.com/player?src=https%3A%2F%2Fgeet.in.net%2Fget%2Fbloxors%2Fgame.html'
            },
            {
                id: 'ninecraft',
                title: 'NINECRAFT',
                shortDesc: 'Minecraft 1.8.8 Tarayıcı Sürümü.',
                description: 'Sonsuz blok dünyasında yapılar inşa edin, maden kazın ve hayatta kalmaya çalışın.',
                gameUrl: 'https://play.rantey.com/'
            },
            {
                id: 'yasli-babaanne',
                title: 'Yaşlı Babaanne',
                shortDesc: 'Granny: Evden kaçmak için 5 günün var.',
                description: 'Babaanne sizi evine kilitledi. Sessiz olun ve bulmacaları çözerek evden kaçmaya çalışın.',
                gameUrl: 'https://db.mathify.top/html/granny/index.html'
            }
        ];

        let currentGameId = null;

        function showView(viewName) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-detail').classList.add('hidden');
            document.getElementById('view-player').classList.add('hidden');

            document.getElementById('view-' + viewName).classList.remove('hidden');
            
            if (viewName !== 'player') {
                document.getElementById('game-frame').src = '';
                if (document.fullscreenElement) document.exitFullscreen();
            }
            window.scrollTo(0, 0);
        }

        function loadGameDetail(gameId) {
            const game = GAMES_DB.find(g => g.id === gameId);
            if (!game) return;
            currentGameId = gameId;
            document.getElementById('detail-title').innerText = game.title;
            document.getElementById('detail-desc').innerText = game.description;
            document.getElementById('play-btn').onclick = () => loadGamePlayer(gameId);
            showView('detail');
        }

        function loadGamePlayer(gameId) {
            const game = GAMES_DB.find(g => g.id === gameId);
            if (!game) return;
            document.getElementById('player-title').innerText = game.title;
            document.getElementById('game-frame').src = game.gameUrl;
            showView('player');
        }

        async function toggleFullscreen() {
            const elem = document.getElementById('game-container');
            
            try {
                if (!document.fullscreenElement) {
                    if (elem.requestFullscreen) {
                        await elem.requestFullscreen();
                    } else if (elem.webkitRequestFullscreen) {
                        await elem.webkitRequestFullscreen();
                    }
                } else {
                    if (document.exitFullscreen) {
                        await document.exitFullscreen();
                    }
                }
            } catch (err) {
                console.warn("Tam ekran kısıtlaması.");
            }
        }

        function renderHome() {
            const container = document.getElementById('game-list');
            container.innerHTML = '';
            GAMES_DB.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card p-10 flex justify-between items-center';
                card.onclick = () => loadGameDetail(game.id);
                card.innerHTML = `
                    <div>
                        <h3 class="font-black text-2xl mb-1 uppercase italic tracking-tight">${game.title}</h3>
                        <p class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest">${game.shortDesc}</p>
                    </div>
                    <div class="text-zinc-800">
                         <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.onload = renderHome;
    </script>
</body>
</html>
